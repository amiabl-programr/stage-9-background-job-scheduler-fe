name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Frontend
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_IP }} \
            >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=accept-new \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "echo SSH connection successful"

      - name: Build and Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -euxo pipefail

            REPO_DIR="/var/www/scheduler-ui"
            WEB_ROOT="/var/www/html"

            mkdir -p "$REPO_DIR"
            mkdir -p "$WEB_ROOT"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone \
                https://github.com/amiabl-programr/stage-9-background-job-scheduler-fe.git \
                "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            git fetch origin main
            git reset --hard origin/main

            cat > .env << EOF
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            EOF

            corepack enable || true

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            pnpm install --frozen-lockfile
            pnpm build

            test -f dist/index.html

            rm -rf "$WEB_ROOT"/*
            cp -R dist/* "$WEB_ROOT"/

            if command -v nginx >/dev/null 2>&1; then
              sudo nginx -t
              sudo systemctl reload nginx
            fi

            echo "Deployment completed"

      - name: Smoke check
        run: |
          curl \
            --fail \
            --retry 5 \
            --retry-delay 3 \
            --retry-connrefused \
            https://${{ secrets.APP_DOMAIN }}/

      - name: Deployment Summary
        run: |
          {
            echo "## Deployment Summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- Triggered by: ${{ github.actor }}"
            echo "- Time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Smoke check: PASSED"
          } >> $GITHUB_STEP_SUMMARY
