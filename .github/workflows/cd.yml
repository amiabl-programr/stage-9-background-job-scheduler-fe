name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity
        run: |
          ssh -v -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=accept-new \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            echo "SSH connection successful"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            mkdir -p /var/www/scheduler-ui
            cd /var/www/scheduler-ui

            # Clone repo if not exists
            if [ ! -d .git ]; then
              git clone https://github.com/amiabl-programr/stage-9-background-job-scheduler-fe.git .
            fi

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Create frontend env file (IMPORTANT: used during build)
            cat > .env <<EOF
            VITE_API_BASE=${VITE_API_BASE}
            EOF

            # Install dependencies and build
            pnpm install --frozen-lockfile
            pnpm build

            # Optional verification
            echo "Frontend build environment:"
            cat .env

      - name: Smoke check
        run: |
          curl --fail --retry 5 --retry-delay 3 --retry-connrefused \
            https://${{ secrets.APP_DOMAIN }}/

      - name: Write deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (UTC):** $(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke check:** ✅ passed" >> $GITHUB_STEP_SUMMARY
